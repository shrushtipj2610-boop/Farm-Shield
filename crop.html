<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crop Health</title>
  <link rel="icon" type="image/png" href="assets/farm_logo.png">
  <link rel="shortcut icon" type="image/png" href="assets/farm_logo.png">
  <link rel="stylesheet" href="style.css">
</head>

<body class="soft-bg-page">
<div class="app-shell">

  <aside class="sidebar">
    <div class="logo-box">
      <img src="assets/farm_logo.png" alt="FarmShield logo">
      <div>
        <h2>FarmShield</h2>
        <p>By SoilSync</p>
      </div>
    </div>

    <nav class="nav-links" aria-label="Main navigation">
      <a href="index.html"><img class="nav-icon" src="assets/dashboard_logo.png" alt="">Dashboard</a>
      <a href="analytics.html"><img class="nav-icon" src="assets/analysics_logo1.png" alt="">Analytics</a>
      <a href="alerts.html"><img class="nav-icon" src="assets/alert_logo.png" alt="">Alerts</a>
      <a href="crop.html" class="active"><img class="nav-icon" src="assets/crop_logo.png" alt="">Crop Health</a>
    </nav>
  </aside>

  <main class="main">
    <div class="header with-icon crop-title">Crop Health</div>

    <div class="cards">
      <div class="card">
        <h3>pH Level</h3>
        <div id="ph" class="value">--</div>
      </div>

      <div class="card">
        <h3>Soil Moisture</h3>
        <div id="soil" class="value">--</div>
      </div>

      <div class="card">
        <h3>Crop Status</h3>
        <div id="crop-status" class="value">Healthy</div>
      </div>
    </div>

    <div class="box">
      Soil and pH values are monitored together for crop health recommendations.
    </div>
  </main>

</div>

<script type="module" src="script.js"></script>
</body>
</html>
